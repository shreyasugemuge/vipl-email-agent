# ============================================================
# VIPL Email Agent — Default Configuration
# ============================================================
# This file contains ONLY non-sensitive defaults.
# All secrets and org-specific values come from environment
# variables set in Cloud Run:
#
#   GOOGLE_CHAT_WEBHOOK_URL  (Secret Manager)
#   ANTHROPIC_API_KEY        (Secret Manager)
#   GOOGLE_SHEET_ID          (env var)
#   MONITORED_INBOXES        (env var, comma-separated)
#   ADMIN_EMAIL              (env var)
#   EOD_RECIPIENTS           (env var, comma-separated)
#   /secrets/service-account.json  (Secret Manager file mount)
# ============================================================

# --- Gmail Polling Defaults ---
gmail:
  poll_interval_seconds: 300
  processed_label: "Agent/Processed"

# --- Claude AI (cost-optimized: Haiku default, Sonnet for CRITICAL only) ---
claude:
  model: "claude-haiku-4-5-20251001"                # ~12x cheaper than Sonnet
  escalation_model: "claude-sonnet-4-5-20250929"     # Used only for CRITICAL emails
  max_tokens: 512                                    # Haiku: 512, Sonnet: 768 (auto)
  temperature: 0.3

# --- Google Sheets Tab Names ---
google_sheets:
  email_log_tab: "Email Log"
  sla_config_tab: "SLA Config"
  team_tab: "Team"
  change_log_tab: "Change Log"
  dashboard_tab: "Dashboard"
  agent_config_tab: "Agent Config"

# --- Google Auth ---
google:
  service_account_key_path: "/secrets/service-account.json"

# --- SLA Defaults ---
sla:
  check_interval_seconds: 900
  business_hours_only: false
  business_hours_start: 9
  business_hours_end: 18
  business_days: [0, 1, 2, 3, 4, 5]
  breach_alert_cooldown_hours: 4
  defaults:
    "Government/Tender": 4
    "Complaint": 4
    "Sales Lead": 4
    "Support Request": 8
    "General Inquiry": 24
    "Partnership": 24
    "Internal": 24
    "Vendor": 48

# --- EOD Summary Defaults ---
eod:
  send_hour: 19
  send_minute: 0
  timezone: "Asia/Kolkata"

# --- Admin Defaults ---
admin:
  max_consecutive_failures: 3

# --- State File ---
state:
  file_path: "state.json"
