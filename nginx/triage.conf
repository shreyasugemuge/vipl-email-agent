# ============================================================
# VIPL Email Agent v2 -- Nginx Reverse Proxy
# ============================================================
# Deployment steps:
#   1. Copy to VM: /etc/nginx/sites-available/triage.vidarbhainfotech.com
#   2. Symlink:    ln -s /etc/nginx/sites-available/triage.vidarbhainfotech.com /etc/nginx/sites-enabled/
#   3. Test:       nginx -t
#   4. Reload:     systemctl reload nginx
#   5. SSL:        certbot --nginx -d triage.vidarbhainfotech.com
# ============================================================

server {
    listen 80;
    server_name triage.vidarbhainfotech.com;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
