# ============================================================
# VIPL Email Agent v2 -- Nginx Reverse Proxy
# ============================================================
# Deployment steps:
#   1. Copy to VM: /etc/nginx/sites-enabled/triage
#   2. Test:       nginx -t
#   3. Reload:     systemctl reload nginx
#   4. SSL:        certbot --nginx -d triage.vidarbhainfotech.com
#
# NOTE: Cloudflare handles HTTP→HTTPS redirect. Do NOT add a
# separate port-80 redirect block — it causes a redirect loop
# with Cloudflare's "Always Use HTTPS" setting.
# ============================================================

# Rate limiting zone: 10 requests/sec per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=triage_limit:10m rate=10r/s;

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name triage.vidarbhainfotech.com;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/triage.vidarbhainfotech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/triage.vidarbhainfotech.com/privkey.pem;

    client_max_body_size 50M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        limit_req zone=triage_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
