# ============================================================
# VIPL Email Agent v2 -- Docker Compose (Local Development)
# ============================================================
# Usage: docker compose -f docker-compose.dev.yml up
# Adds Caddy reverse proxy for local dev at http://localhost:8100
# Production uses docker-compose.yml + Nginx on the VM
# ============================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: vipl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_files:/srv/staticfiles:ro
    depends_on:
      web:
        condition: service_healthy

  web:
    build: .
    container_name: vipl-email-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    expose:
      - "8000"
    networks:
      - default
      - taiga
    volumes:
      - static_files:/app/staticfiles
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build: .
    container_name: vipl-email-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    networks:
      - default
      - taiga
    volumes:
      - ./secrets:/app/secrets:ro
    command: python manage.py run_scheduler
    depends_on:
      web:
        condition: service_healthy

volumes:
  static_files:
  caddy_data:
  caddy_config:

networks:
  taiga:
    external: true
    name: taiga-docker_taiga
