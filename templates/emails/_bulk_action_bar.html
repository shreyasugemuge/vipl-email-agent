{# Floating Bulk Action Bar -- visible when >= 1 thread checkbox is checked #}
<div id="bulk-action-bar"
     role="toolbar"
     aria-label="Bulk actions for selected threads"
     class="fixed bottom-4 left-1/2 -translate-x-1/2 max-w-lg w-[calc(100%-2rem)] z-50
            bg-[var(--vipl-surface)] border border-[var(--vipl-border)] rounded box-glow-primary
            px-4 py-3
            transition-all duration-300 ease-out
            translate-y-full opacity-0 pointer-events-none">

    {# Normal mode: assign + mark irrelevant #}
    <div id="bulk-normal-mode" class="flex items-center gap-2 flex-wrap sm:flex-nowrap">
        <span id="bulk-count" class="text-sm font-semibold font-mono text-[var(--vipl-text)] whitespace-nowrap">0 selected</span>

        <form id="bulk-assign-form"
              hx-post="{% url 'emails:bulk_assign' %}"
              hx-target="#thread-list-body"
              hx-swap="innerHTML"
              class="flex items-center gap-1.5 flex-1 min-w-0">
            <div id="bulk-assign-thread-ids"></div>
            <select name="assignee_id" class="vipl-select text-sm rounded px-2 py-2 min-w-0 flex-1">
                {% for member in team_members %}
                <option value="{{ member.pk }}">{{ member.get_full_name|default:member.username }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-[var(--vipl-primary)] hover:bg-[var(--vipl-primary-dim)] text-[var(--vipl-bg)] text-sm font-bold font-mono px-3 py-2 rounded whitespace-nowrap cursor-pointer transition-colors">
                Assign
            </button>
        </form>

        <div class="w-px h-6 bg-[var(--vipl-border)] mx-1 hidden sm:block"></div>

        <button id="bulk-irrelevant-btn" type="button" onclick="showIrrelevantMode()"
                class="bg-[var(--vipl-gold)]/10 hover:bg-[var(--vipl-gold)]/20 text-[var(--vipl-gold)] text-sm font-bold font-mono px-3 py-2 rounded border border-[var(--vipl-gold)]/25 whitespace-nowrap cursor-pointer transition-colors">
            Irrelevant
        </button>

        <button type="button" onclick="clearBulkSelection()" class="text-[var(--vipl-text-muted)] hover:text-[var(--vipl-text-dim)] text-sm underline whitespace-nowrap cursor-pointer">
            Clear
        </button>
    </div>

    {# Irrelevant reason mode: replaces normal mode content #}
    <div id="bulk-irrelevant-mode" class="hidden">
        <form id="bulk-irrelevant-form"
              hx-post="{% url 'emails:bulk_mark_irrelevant' %}"
              hx-target="#thread-list-body"
              hx-swap="innerHTML"
              class="flex items-center gap-2 flex-wrap sm:flex-nowrap">
            <div id="bulk-irrelevant-thread-ids"></div>
            <input type="text" name="reason" placeholder="Why are these irrelevant?"
                   id="bulk-irrelevant-reason"
                   class="vipl-select text-sm rounded px-3 py-2 flex-1 min-w-0"
                   oninput="toggleIrrelevantConfirm()">
            <button type="submit" id="bulk-irrelevant-confirm"
                    disabled
                    class="bg-[var(--vipl-gold)] hover:brightness-110 text-[var(--vipl-bg)] text-sm font-bold font-mono px-3 py-2 rounded whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer transition-colors">
                Mark Irrelevant
            </button>
            <button type="button" onclick="hideIrrelevantMode()" class="text-sm text-[var(--vipl-text-muted)] hover:text-[var(--vipl-text-dim)] underline whitespace-nowrap cursor-pointer">
                Cancel
            </button>
        </form>
    </div>
</div>
