{% load email_tags %}
{% comment %}
Inline-editable status badge with pencil-on-hover.
Context: thread, statuses (Thread.Status.choices).
{% endcomment %}
<div class="group/sta relative inline-flex items-center" id="editable-status">
    <!-- Display mode: colored badge + pencil -->
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[9px] font-semibold bg-{{ thread.status|status_base }}-50 text-{{ thread.status|status_base }}-600 border border-{{ thread.status|status_base }}-200/50 cursor-pointer"
          onclick="this.closest('#editable-status').querySelector('.sta-edit').classList.remove('hidden'); this.closest('.sta-display').classList.add('hidden');"
          title="{{ thread.status|status_tooltip }}">
        <span class="w-1 h-1 rounded-full bg-{{ thread.status|status_base }}-500"></span>
        {{ thread.get_status_display }}
    </span>
    {% if thread.assigned_to == request.user or is_admin %}
    <button type="button"
            class="ml-0.5 opacity-0 group-hover/sta:opacity-100 transition-opacity text-slate-400 hover:text-slate-600"
            onclick="this.closest('#editable-status').querySelector('.sta-edit').classList.remove('hidden'); this.closest('#editable-status').querySelector('.sta-display').classList.add('hidden');"
            title="Edit status">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
    </button>

    <!-- Edit mode: dropdown -->
    <div class="sta-edit hidden">
        <form hx-post="{% url 'emails:edit_status' thread.pk %}"
              hx-target="#thread-detail-panel"
              hx-swap="innerHTML"
              hx-indicator="#sta-loading">
            {% csrf_token %}
            <select name="new_status"
                    class="text-[10px] font-semibold border border-slate-300 rounded-md px-1.5 py-0.5 bg-white text-slate-600 focus:ring-2 focus:ring-primary-500/15 focus:border-primary-300 cursor-pointer"
                    hx-trigger="change"
                    hx-post="{% url 'emails:edit_status' thread.pk %}"
                    hx-target="#thread-detail-panel"
                    hx-swap="innerHTML"
                    hx-include="closest form">
                {% for value, label in statuses %}
                <option value="{{ value }}" {% if value == thread.status %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </form>
        <span id="sta-loading" class="htmx-indicator ml-1">
            <svg class="w-3 h-3 animate-spin text-slate-400" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </span>
    </div>
    {% endif %}
</div>
