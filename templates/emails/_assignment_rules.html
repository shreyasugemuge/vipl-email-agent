{% load email_tags %}

<div class="rules-container">
    {% if save_success %}
    <div class="mx-3 mt-3 px-4 py-2 bg-emerald-50 border border-emerald-200/60 rounded-lg text-xs font-medium text-emerald-700">
        Assignment rules saved successfully.
    </div>
    {% endif %}
    <div class="px-4 py-3 bg-slate-50/60 border-b border-slate-200/40">
        <h3 class="text-xs font-bold text-slate-700">{{ category }}</h3>
    </div>
    <div class="p-3">
        <!-- Current rules (drag-reorderable) -->
        <div class="sortable-rules space-y-1.5 min-h-[32px]" data-category="{{ category }}">
            {% for rule in rules %}
            <div class="flex items-center justify-between gap-2 px-3 py-2 bg-white border border-slate-200/60 rounded-lg cursor-grab active:cursor-grabbing"
                 data-assignee-id="{{ rule.assignee_id }}">
                <div class="flex items-center gap-2">
                    <svg class="w-3.5 h-3.5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
                    </svg>
                    <span class="text-xs font-semibold text-slate-700">{{ rule.assignee.get_full_name|default:rule.assignee.username }}</span>
                </div>
                <form hx-post="{% url 'emails:settings_rules_save' %}"
                      hx-target="closest .rules-container" hx-swap="innerHTML"
                      class="inline">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="remove">
                    <input type="hidden" name="category" value="{{ category }}">
                    <input type="hidden" name="assignee_id" value="{{ rule.assignee_id }}">
                    <button type="submit" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </form>
            </div>
            {% empty %}
            <div class="text-[10px] text-slate-400 italic py-1">No rules configured</div>
            {% endfor %}
        </div>

        <!-- Add member form -->
        <form hx-post="{% url 'emails:settings_rules_save' %}"
              hx-target="closest .rules-container" hx-swap="innerHTML"
              class="flex items-center gap-2 mt-2">
            {% csrf_token %}
            <input type="hidden" name="action" value="add">
            <input type="hidden" name="category" value="{{ category }}">
            <select name="assignee_id" class="flex-1 text-xs border border-slate-200/80 rounded-lg px-2 py-1.5 bg-white text-slate-600">
                <option value="">Add member...</option>
                {% for member in team_members %}
                <option value="{{ member.pk }}">{{ member.get_full_name|default:member.username }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="px-3 py-1.5 text-[10px] font-bold text-indigo-700 bg-indigo-50 rounded-lg border border-indigo-200/60 hover:bg-indigo-100 transition-colors">
                Add
            </button>
        </form>
    </div>
</div>
