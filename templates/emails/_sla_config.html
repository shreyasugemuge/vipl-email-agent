<div class="bg-white rounded-xl border border-slate-200/60 shadow-sm overflow-hidden">
    <div class="px-4 py-3 bg-slate-50/60 border-b border-slate-200/40">
        <h3 class="text-xs font-bold text-slate-700">SLA Configuration</h3>
        <p class="text-[10px] text-slate-400 mt-0.5">Set acknowledgement and response hours per priority and category (business hours).</p>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-xs">
            <thead>
                <tr class="border-b border-slate-200/40">
                    <th class="text-left px-4 py-2.5 font-bold text-slate-500 uppercase tracking-wider text-[10px]">Priority</th>
                    <th class="text-left px-3 py-2.5 font-bold text-slate-500 uppercase tracking-wider text-[10px]">Category</th>
                    <th class="text-center px-3 py-2.5 font-bold text-slate-500 uppercase tracking-wider text-[10px]">Ack Hours</th>
                    <th class="text-center px-3 py-2.5 font-bold text-slate-500 uppercase tracking-wider text-[10px]">Respond Hours</th>
                    <th class="px-3 py-2.5 text-[10px]"></th>
                </tr>
            </thead>
            <tbody>
                {% for item in sla_matrix %}
                <tr class="border-b border-slate-100 hover:bg-slate-50/60 transition-colors">
                    <form hx-post="{% url 'emails:settings_sla_save' %}"
                          hx-target="#sla-matrix" hx-swap="innerHTML">
                        {% csrf_token %}
                        <input type="hidden" name="priority" value="{{ item.priority }}">
                        <input type="hidden" name="category" value="{{ item.category }}">
                        <td class="px-4 py-2 font-bold text-slate-700">{{ item.priority }}</td>
                        <td class="px-3 py-2 text-slate-600">{{ item.category }}</td>
                        <td class="px-3 py-2 text-center">
                            <input type="number" name="ack_hours" value="{{ item.ack_hours }}" step="0.5" min="0.5"
                                   class="w-16 text-xs text-center border border-slate-200/80 rounded-lg px-1.5 py-1 bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300">
                        </td>
                        <td class="px-3 py-2 text-center">
                            <input type="number" name="respond_hours" value="{{ item.respond_hours }}" step="0.5" min="0.5"
                                   class="w-16 text-xs text-center border border-slate-200/80 rounded-lg px-1.5 py-1 bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-300">
                        </td>
                        <td class="px-3 py-2">
                            <button type="submit" class="px-2.5 py-1 text-[10px] font-bold text-indigo-700 bg-indigo-50 rounded-md border border-indigo-200/60 hover:bg-indigo-100 transition-colors">
                                Save
                            </button>
                        </td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
