{% load email_tags %}
{% comment %}
Pill-styled priority select with hover caret.
Context: thread, priorities (list of valid priorities).
{% endcomment %}
<div class="group/pri inline-flex items-center gap-0.5" id="editable-priority">
    <form hx-post="{% url 'emails:edit_priority' thread.pk %}"
          hx-target="#thread-detail-panel"
          hx-swap="innerHTML"
          hx-indicator="#pri-loading">
        {% csrf_token %}
        <select name="priority"
                class="appearance-none rounded-full px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-wider cursor-pointer bg-{{ thread.priority|priority_base }}-50 text-{{ thread.priority|priority_base }}-700 border border-{{ thread.priority|priority_base }}-200/50 focus:ring-2 focus:ring-primary-500/15 focus:outline-none pr-5"
                hx-trigger="change"
                hx-post="{% url 'emails:edit_priority' thread.pk %}"
                hx-target="#thread-detail-panel"
                hx-swap="innerHTML"
                hx-include="closest form"
                title="{{ thread.priority|priority_tooltip }}">
            {% for pri in priorities %}
            <option value="{{ pri }}" {% if pri == thread.priority %}selected{% endif %}>{{ pri }}</option>
            {% endfor %}
        </select>
    </form>
    <!-- Hover caret -->
    <svg class="w-2.5 h-2.5 text-slate-400 opacity-0 group-hover/pri:opacity-100 transition-opacity pointer-events-none -ml-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
    </svg>
    <!-- Loading spinner -->
    <span id="pri-loading" class="htmx-indicator ml-1">
        <svg class="w-3 h-3 animate-spin text-slate-400" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </span>
</div>
