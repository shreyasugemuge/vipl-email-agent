<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VIPL Email Triage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', system-ui, sans-serif;
        }
    </style>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 30%, #312e81 50%, #1e1b4b 70%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15), 0 1px 2px 0 rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="gradient-bg font-sans min-h-screen flex items-center justify-center p-4">
    <!-- Decorative orbs -->
    <div class="fixed top-1/4 left-1/4 w-72 h-72 bg-indigo-500/10 rounded-full blur-3xl"></div>
    <div class="fixed bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-[400px] relative z-10">
        <div class="glass-card rounded-2xl shadow-2xl shadow-black/20 border border-white/30 p-10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-xl shadow-indigo-500/30 rotate-3 hover:rotate-0 transition-transform duration-300">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Welcome back</h1>
                <p class="text-sm text-slate-500 mt-2">Sign in to VIPL Email Triage</p>
            </div>

            {% if form.errors %}
            <div class="mb-6 p-3.5 bg-red-50/80 border border-red-200/60 rounded-xl text-sm text-red-600 flex items-center gap-2.5 backdrop-blur-sm">
                <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-xs font-semibold text-slate-600 mb-2 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" id="id_username" autofocus
                           class="input-glow w-full px-4 py-3 bg-slate-50/80 border border-slate-200/80 rounded-xl text-sm font-medium text-slate-800 focus:outline-none focus:border-indigo-400 transition-all placeholder:text-slate-400"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label for="id_password" class="block text-xs font-semibold text-slate-600 mb-2 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" id="id_password"
                           class="input-glow w-full px-4 py-3 bg-slate-50/80 border border-slate-200/80 rounded-xl text-sm font-medium text-slate-800 focus:outline-none focus:border-indigo-400 transition-all placeholder:text-slate-400"
                           placeholder="Enter your password">
                </div>
                <button type="submit"
                        class="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 via-indigo-600 to-purple-600 text-white text-sm font-bold rounded-xl hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:ring-offset-2 transition-all shadow-xl shadow-indigo-500/25 active:scale-[0.98]">
                    Sign in
                </button>
            </form>
        </div>
        <p class="text-center text-xs text-indigo-200/40 mt-8 font-medium tracking-wide">Vidarbha Infotech Private Limited</p>
    </div>
</body>
</html>
