{% extends "base.html" %}

{% block title %}Login - VIPL Email Agent{% endblock %}

{% block content %}
<div>
    <h1>Login</h1>

    {% if form.errors %}
    <div>
        <p>Invalid username or password. Please try again.</p>
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_username">Username:</label>
            {{ form.username }}
        </div>
        <div>
            <label for="id_password">Password:</label>
            {{ form.password }}
        </div>
        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
