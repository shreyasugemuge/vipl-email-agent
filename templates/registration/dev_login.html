{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPL Triage | Dev Login</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f1117 0%, #1a0f1a 35%, #2d1525 50%, #1a0f1a 65%, #0f1117 100%);
        }
        .glass-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="gradient-bg font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[380px]">
        <div class="glass-card rounded-2xl shadow-2xl shadow-black/20 border border-white/20 p-9">
            <div class="text-center mb-6">
                <div class="w-14 h-14 mx-auto mb-4 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-xl shadow-amber-500/25">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                    </svg>
                </div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Dev Login</h1>
                <p class="text-[13px] text-slate-400 mt-1.5 font-medium">Pick a role to sign in instantly</p>
            </div>

            <div class="mb-4 p-2.5 bg-amber-50 border border-amber-200 rounded-xl text-[12px] text-amber-700 font-semibold text-center">
                DEBUG mode only — disabled in production
            </div>

            <div class="space-y-3">
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="role" value="admin">
                    <button type="submit"
                            class="w-full flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-xl hover:bg-primary-50 hover:border-primary-200 transition-all active:scale-[0.98]">
                        <div class="w-10 h-10 rounded-lg bg-primary-100 flex items-center justify-center shrink-0">
                            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="text-sm font-bold text-slate-800">Admin</div>
                            <div class="text-[12px] text-slate-400">Full access, can assign emails</div>
                        </div>
                    </button>
                </form>

                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="role" value="member">
                    <button type="submit"
                            class="w-full flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-xl hover:bg-primary-50 hover:border-primary-200 transition-all active:scale-[0.98]">
                        <div class="w-10 h-10 rounded-lg bg-primary-100 flex items-center justify-center shrink-0">
                            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="text-sm font-bold text-slate-800">Team Member</div>
                            <div class="text-[12px] text-slate-400">Sees only assigned emails</div>
                        </div>
                    </button>
                </form>
            </div>

            <div class="mt-6 text-center">
                <a href="{% url 'login' %}" class="text-[12px] text-slate-400 hover:text-primary-500 font-medium transition-colors">
                    Back to normal login
                </a>
            </div>
        </div>
        <p class="text-center text-[11px] text-primary-200/30 mt-6 font-semibold tracking-wide">Vidarbha Infotech Private Limited</p>
    </div>
</body>
</html>
