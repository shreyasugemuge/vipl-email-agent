{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPL Triage | Completing Sign-In</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
            --color-primary-50: #fdf2f8;
            --color-primary-100: #fce7f1;
            --color-primary-400: #e06a97;
            --color-primary-500: #c94476;
            --color-primary-600: #a83362;
            --color-primary-700: #8b2852;
        }
    </style>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f1117 0%, #1a0f1a 35%, #2d1525 50%, #1a0f1a 65%, #0f1117 100%);
            background-size: 300% 300%;
            animation: gradient-shift 20s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        @keyframes spin-slow { to { transform: rotate(360deg); } }
        .spinner { animation: spin-slow 1.2s linear infinite; }
    </style>
</head>
<body class="gradient-bg font-sans min-h-screen flex items-center justify-center p-4">
    <div class="fixed top-1/3 left-1/5 w-64 h-64 bg-primary-500/8 rounded-full blur-3xl"></div>
    <div class="fixed bottom-1/4 right-1/4 w-80 h-80 bg-primary-500/8 rounded-full blur-3xl"></div>

    <div class="w-full max-w-[380px] relative z-10">
        <div class="glass-card rounded-2xl shadow-2xl shadow-black/20 border border-white/20 p-9">
            <div class="text-center mb-6">
                <img src="{% static 'img/vipl-logo-full.jpg' %}" alt="Vidarbha Infotech Pvt. Ltd." class="max-w-[220px] mx-auto mb-4">
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Creating your account</h1>
                <p class="text-[13px] text-slate-400 mt-1.5 font-medium">Setting up your VIPL Triage profile...</p>
            </div>

            <div class="flex justify-center mb-6">
                <svg class="w-8 h-8 text-primary-500 spinner" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>

            {% if form %}
            <form method="post" id="social-signup-form">
                {% csrf_token %}
                {% for field in form %}
                <input type="hidden" name="{{ field.name }}" value="{{ field.value|default:'' }}">
                {% endfor %}
            </form>
            <script>document.getElementById('social-signup-form').submit();</script>
            {% endif %}
        </div>
        <p class="text-center text-[11px] text-primary-200/30 mt-6 font-semibold tracking-wide">Vidarbha Infotech Private Limited</p>
    </div>
</body>
</html>
