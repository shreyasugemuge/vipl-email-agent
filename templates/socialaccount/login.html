{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPL Triage | Signing In...</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f1117 0%, #1a0f1a 35%, #2d1525 50%, #1a0f1a 65%, #0f1117 100%);
            background-size: 300% 300%;
            animation: gradient-shift 20s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        @keyframes spin-slow { to { transform: rotate(360deg); } }
        .spinner { animation: spin-slow 1.2s linear infinite; }
    </style>
</head>
<body class="gradient-bg font-sans min-h-screen flex items-center justify-center p-4">
    <div class="fixed top-1/3 left-1/5 w-64 h-64 bg-primary-500/8 rounded-full blur-3xl"></div>
    <div class="fixed bottom-1/4 right-1/4 w-80 h-80 bg-primary-500/8 rounded-full blur-3xl"></div>

    <div class="w-full max-w-[380px] relative z-10">
        <div class="glass-card rounded-2xl shadow-2xl shadow-black/20 border border-white/20 p-9">
            <div class="text-center mb-6">
                <img src="{% static 'img/vipl-logo-full.jpg' %}" alt="Vidarbha Infotech Pvt. Ltd." class="max-w-[220px] mx-auto mb-4">
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Signing in with Google</h1>
                <p class="text-[13px] text-slate-400 mt-1.5 font-medium">Redirecting you to Google...</p>
            </div>

            <div class="flex justify-center mb-6">
                <svg class="w-8 h-8 text-primary-500 spinner" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>

            {% if form %}
            <form method="post" id="google-login-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit"
                        class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-50 hover:border-slate-300 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:ring-offset-2 transition-all shadow-sm active:scale-[0.98]">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </form>
            <script>document.getElementById('google-login-form').submit();</script>
            {% endif %}
        </div>
        <p class="text-center text-[11px] text-primary-200/30 mt-6 font-semibold tracking-wide">Vidarbha Infotech Private Limited</p>
    </div>
</body>
</html>
