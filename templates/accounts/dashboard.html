{% extends "base.html" %}

{% block title %}Dashboard - VIPL Email Agent{% endblock %}

{% block content %}
<div>
    <h1>Welcome, {{ user.username }}</h1>
    <p>Role: {{ user.get_role_display }}</p>

    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
</div>
{% endblock %}
