{% load static socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPL Triage | Sign In</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
            --color-primary-50: #fdf2f8;
            --color-primary-100: #fce7f1;
            --color-primary-200: #f9c4db;
            --color-primary-300: #f49bbe;
            --color-primary-400: #e06a97;
            --color-primary-500: #c94476;
            --color-primary-600: #a83362;
            --color-primary-700: #8b2852;
            --color-primary-800: #742345;
            --color-primary-900: #5f1d3a;
        }
    </style>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f1117 0%, #1a0f1a 35%, #2d1525 50%, #1a0f1a 65%, #0f1117 100%);
            background-size: 300% 300%;
            animation: gradient-shift 20s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255,255,255,0.97);
