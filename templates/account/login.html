{% load static socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPL Triage | Sign In</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f1117 0%, #1a0f1a 35%, #2d1525 50%, #1a0f1a 65%, #0f1117 100%);
            background-size: 300% 300%;
            animation: gradient-shift 20s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
    <meta http-equiv="refresh" content="0;url=/accounts/login/">
</head>
<body class="gradient-bg font-sans min-h-screen flex items-center justify-center p-4">
    <p class="text-white text-sm">Redirecting to sign in...</p>
</body>
</html>
