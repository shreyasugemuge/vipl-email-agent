# ============================================================
# VIPL Email Agent v2 -- Docker Compose
# ============================================================
# Single service: Django + Gunicorn
# Joins Taiga's Docker network to reach PostgreSQL (taiga-docker-taiga-db-1)
# Nginx on the host proxies triage.vidarbhainfotech.com to port 8100
# ============================================================

services:
  web:
    build: .
    container_name: vipl-email-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    ports:
      - "8100:8000"
    networks:
      - default
      - taiga
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  static_files:

networks:
  taiga:
    external: true
    name: taiga-docker_taiga
