steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/utilities-vipl/vipl-repo/vipl-email-agent:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/utilities-vipl/vipl-repo/vipl-email-agent:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vipl-email-agent'
      - '--image=asia-south1-docker.pkg.dev/utilities-vipl/vipl-repo/vipl-email-agent:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--no-allow-unauthenticated'
      - '--set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,GOOGLE_CHAT_WEBHOOK_URL=chat-webhook-url:latest'
      - '--set-secrets=/secrets/service-account.json=sa-key:latest'
      - '--set-env-vars=GOOGLE_SHEET_ID=${_SHEET_ID},MONITORED_INBOXES=${_INBOXES},ADMIN_EMAIL=${_ADMIN_EMAIL},EOD_RECIPIENTS=${_EOD_RECIPIENTS}'

substitutions:
  _SHEET_ID: '1fV9AZR22WTS8CY7kxniwX-WtWVdnCp1SRlqjCFlXQ9o'
  _INBOXES: 'info@vidarbhainfotech.com,sales@vidarbhainfotech.com'
  _ADMIN_EMAIL: 'shreyas@vidarbhainfotech.com'
  _EOD_RECIPIENTS: 'shreyas@vidarbhainfotech.com'

images:
  - 'asia-south1-docker.pkg.dev/utilities-vipl/vipl-repo/vipl-email-agent:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
