# ============================================================
# VIPL Email Agent — Release & Changelog Pipeline
# ============================================================
# Triggers when a version tag (v*.*.*) is pushed.
# Generates a detailed changelog from commits since last tag,
# creates a GitHub Release, and posts the changelog to Google Chat.
#
# Usage:
#   git tag -a v1.0.0 -m "Initial production release"
#   git push --tags
# ============================================================

name: Release & Changelog

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PROJECT_ID: utilities-vipl
  REGION: asia-south1
  SERVICE: vipl-email-agent
  IMAGE: asia-south1-docker.pkg.dev/utilities-vipl/vipl-repo/vipl-email-agent

jobs:
  release:
    name: Create Release & Notify
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Create GitHub Release
      id-token: write   # WIF auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Get release info
        id: release_info
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(TZ='Asia/Kolkata' date '+%d %b %Y, %I:%M %p IST')" >> "$GITHUB_OUTPUT"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "prev_tag_name=initial" >> "$GITHUB_OUTPUT"
          else
            echo "prev_tag_name=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.release_info.outputs.prev_tag }}"
          VERSION="${{ steps.release_info.outputs.version }}"

          echo "## What's Changed in ${VERSION}" > changelog.md
          echo "" >> changelog.md

          # Group commits by type
          echo "### Features & Enhancements" >> changelog.md
          git log ${PREV_TAG}..HEAD --oneline --no-merges --format="- %s (%h)" \
            --grep="[Aa]dd\|[Ff]eat\|[Ee]nhance\|[Ii]mplement\|[Nn]ew" >> changelog.md 2>/dev/null || echo "_None_" >> changelog.md
          echo "" >> changelog.md

          echo "### Bug Fixes" >> changelog.md
          git log ${PREV_TAG}..HEAD --oneline --no-merges --format="- %s (%h)" \
            --grep="[Ff]ix\|[Bb]ug\|[Pp]atch\|[Rr]esolve" >> changelog.md 2>/dev/null || echo "_None_" >> changelog.md
          echo "" >> changelog.md

          echo "### Other Changes" >> changelog.md
          git log ${PREV_TAG}..HEAD --oneline --no-merges --format="- %s (%h)" \
            --grep="[Rr]efactor\|[Cc]lean\|[Rr]emove\|[Uu]pdate\|[Oo]ptimize" >> changelog.md 2>/dev/null || echo "_None_" >> changelog.md
          echo "" >> changelog.md

          echo "### All Commits" >> changelog.md
          git log ${PREV_TAG}..HEAD --oneline --no-merges --format="- %s — *%an* (%h)" >> changelog.md
          echo "" >> changelog.md

          COMMIT_COUNT=$(git rev-list --count ${PREV_TAG}..HEAD)
          echo "---" >> changelog.md
          echo "**${COMMIT_COUNT} commits** since ${{ steps.release_info.outputs.prev_tag_name }}" >> changelog.md

          cat changelog.md

          # Also create a short version for Chat (max 15 commits)
          echo "### ${VERSION} Changelog" > changelog_short.txt
          git log ${PREV_TAG}..HEAD --oneline --no-merges --format="• %s (%h)" | head -15 >> changelog_short.txt
          REMAINING=$(( $(git rev-list --count ${PREV_TAG}..HEAD) - 15 ))
          if [ "$REMAINING" -gt 0 ]; then
            echo "• ...and ${REMAINING} more commits" >> changelog_short.txt
          fi

          # Escape for JSON
          CHAT_CHANGELOG=$(cat changelog_short.txt | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "chat_log=${CHAT_CHANGELOG}" >> "$GITHUB_OUTPUT"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.version }}
          name: ${{ steps.release_info.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Tag Docker image with version
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet
          # Pull latest and retag with version
          docker pull ${{ env.IMAGE }}:latest
          docker tag ${{ env.IMAGE }}:latest ${{ env.IMAGE }}:${{ steps.release_info.outputs.version }}
          docker push ${{ env.IMAGE }}:${{ steps.release_info.outputs.version }}

      - name: Notify Google Chat — Release
        run: |
          curl -s -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "cardsV2": [{
                "cardId": "release-${{ steps.release_info.outputs.version }}",
                "card": {
                  "header": {
                    "title": "\U0001f3f7\ufe0f Release ${{ steps.release_info.outputs.version }}",
                    "subtitle": "${{ steps.release_info.outputs.timestamp }} — ${{ steps.changelog.outputs.commit_count }} commits"
                  },
                  "sections": [
                    {
                      "header": "Changelog",
                      "widgets": [
                        {"textParagraph": {"text": "${{ steps.changelog.outputs.chat_log }}"}}
                      ]
                    },
                    {
                      "header": "Docker Image",
                      "widgets": [
                        {"decoratedText": {"topLabel": "Image Tag", "text": "${{ env.IMAGE }}:${{ steps.release_info.outputs.version }}"}},
                        {"decoratedText": {"topLabel": "Previous Version", "text": "${{ steps.release_info.outputs.prev_tag_name }}"}}
                      ]
                    },
                    {
                      "widgets": [
                        {"buttonList": {"buttons": [
                          {"text": "GitHub Release", "onClick": {"openLink": {"url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_info.outputs.version }}"}}},
                          {"text": "Full Diff", "onClick": {"openLink": {"url": "https://github.com/${{ github.repository }}/compare/${{ steps.release_info.outputs.prev_tag_name }}...${{ steps.release_info.outputs.version }}"}}}
                        ]}}
                      ]
                    }
                  ]
                }
              }]
            }'
