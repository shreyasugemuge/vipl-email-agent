# ============================================================
# VIPL Email Agent v2 -- CI/CD Pipeline
# ============================================================
# Triggers:
#   - Version tags (v*.*.*): test -> deploy via SSH to VM
#   - Pull requests to main: test only (no deploy)
#
# VM deployment via SSH to taiga VM.
# ============================================================

name: Deploy & Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  # ---- Job 1: Run tests (always) ----
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  # ---- Job 2: Deploy to VM via SSH (tags only) ----
  deploy:
    name: Deploy to VM
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/vipl-email-agent
            git fetch --tags
            git checkout ${{ github.ref_name }}
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sleep 5
            sudo docker compose exec -T web python manage.py migrate --noinput
            echo "Deployed ${{ github.ref_name }}"
