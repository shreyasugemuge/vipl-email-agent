# ============================================================
# VIPL Email Agent -- Deploy on Release
# ============================================================
# Triggers when a GitHub Release is published.
# Flow: test → deploy to VM via SSH.
#
# To deploy: Create a release on GitHub (or `gh release create`).
# This ensures every deploy is intentional and documented.
# ============================================================

name: Deploy

on:
  release:
    types: [published]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  deploy:
    name: Deploy to VM
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/vipl-email-agent
            git fetch --tags
            git checkout ${{ github.event.release.tag_name }}
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sleep 5
            sudo docker compose exec -T web python manage.py migrate --noinput
            echo "Deployed ${{ github.event.release.tag_name }}"
