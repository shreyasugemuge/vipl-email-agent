# ============================================================
# VIPL Email Agent -- Deploy on Release
# ============================================================
# Triggers when a GitHub Release is published.
# Flow: test → deploy to VM via SSH.
#
# To deploy: Create a release on GitHub (or `gh release create`).
# This ensures every deploy is intentional and documented.
# ============================================================

name: Deploy

on:
  release:
    types: [published]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  deploy:
    name: Deploy to VM
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Notify Chat — deploying
        if: secrets.GOOGLE_CHAT_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text": "🚀 *Deploying ${{ github.event.release.tag_name }}* to triage.vidarbhainfotech.com …"}'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/vipl-email-agent
            sudo git fetch --all --tags --force
            sudo git checkout ${{ github.event.release.tag_name }}
            export APP_VERSION="${{ github.event.release.tag_name }}"
            sudo -E docker compose build
            sudo docker compose down
            sudo -E docker compose run --rm web python manage.py migrate --noinput
            sudo -E docker compose run --rm web python manage.py collectstatic --noinput
            sudo -E docker compose up -d --force-recreate
            echo "Deployed ${{ github.event.release.tag_name }}"

      - name: Notify Chat — deployed
        if: success() && secrets.GOOGLE_CHAT_WEBHOOK_URL != ''
        run: |
          BODY=$(echo '${{ github.event.release.body }}' | head -c 500 | sed 's/"/\\"/g' | tr '\n' ' ')
          curl -s -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"✅ *${{ github.event.release.tag_name }}* deployed successfully\\n\\n${BODY}\"}"

      - name: Notify Chat — deploy failed
        if: failure() && secrets.GOOGLE_CHAT_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{"text": "❌ *Deploy ${{ github.event.release.tag_name }} FAILED* — check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
